# Aipply - Job Search Settings

search:
  keywords:
    - "compliance manager"
    - "audit manager"
  locations:
    - "San Francisco Bay Area"
    - "Remote"
  experience_levels:
    - "Mid-Senior level"
    - "Director"
    - "Associate"
  job_types:
    - "Full-time"

exclusions:
  companies:
    - "PG&E"
    - "Pacific Gas and Electric"
    - "Pacific Gas & Electric"

application:
  email: "danna.dobi@gmail.com"
  auto_apply: true
  max_applications_per_cycle: 10

schedule:
  interval_minutes: 30
  delay_between_applications_seconds: 600  # 10 min between each application

openai:
  model: "gpt-4"
  temperature: 0.7
