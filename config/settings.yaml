# Aipply - Job Search Settings

search:
  # IC roles (90% of applications)
  keywords:
    - "compliance analyst"
    - "senior compliance analyst"
    - "compliance officer"
    - "risk analyst"
    - "senior risk analyst"
    - "audit analyst"
    - "senior audit analyst"
    - "governance analyst"
    - "regulatory analyst"
    - "compliance specialist"
  # Manager roles (10% cap — cron instructions limit these)
  manager_keywords:
    - "compliance manager"
    - "audit manager"
  locations:
    - "San Francisco Bay Area"
    - "Remote"
  experience_levels:
    - "Mid-Senior level"
    - "Director"
    - "Associate"
  job_types:
    - "Full-time"

exclusions:
  companies:
    - "PG&E"
    - "Pacific Gas and Electric"
    - "Pacific Gas & Electric"

application:
  email: "danna.dobi@gmail.com"
  auto_apply: true
  max_applications_per_cycle: 10

schedule:
  interval_minutes: 30
  delay_between_applications_seconds: 600  # 10 min between each application

openai:
  model: "gpt-4"
  temperature: 0.7

# Job title relevance filter (added 2026-03-25)
filter:
  positive_keywords:
    - compliance
    - risk
    - audit
    - fraud
    - bsa
    - aml
    - regulatory
    - governance
    - monitoring
    - analyst
    - specialist
    - examiner
    - investigator
    - testing
    - quality control
    - operations
    - officer
    - coordinator
  negative_keywords:
    - investment banking
    - software engineer
    - data scientist
    - sales
    - marketing
    - oracle
    - sap
    - hcm
    - payroll specialist
    - customer service
    - warehouse
    - driver
    - nurse
    - teacher
    - real estate
    - proposal strategist
